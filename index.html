<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Button Image</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    /* Button styling */
    #showBtn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      z-index: 10;
    }
  </style>
</head>

<body>

<button id="showBtn">Show Image</button>

<a-scene
  mindar-face="autoStart: true"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
>

  <a-camera active="false"></a-camera>

  <!-- Image in center -->
  <a-entity id="imageBox" visible="false" position="0 0 -1">
    <a-plane src="https://cdn.pixabay.com/photo/2023/01/01/12/00/flower-7692454_1280.jpg"
             width="1.5" height="1.5">
    </a-plane>
  </a-entity>

</a-scene>

<script>
  const btn = document.getElementById("showBtn");
  const image = document.getElementById("imageBox");

  btn.addEventListener("click", () => {
    image.setAttribute("visible", "true");
  });
</script>

</body>
</html>
